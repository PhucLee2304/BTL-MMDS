name: mmds

services:
  worker:
    build:
      context: ../..
      dockerfile: docker/worker_docker/Dockerfile
    image: hadoop-spark-worker:real
    container_name: worker
    # Docker Desktop on Windows does NOT support network_mode:host.
    # Port-mapping: Docker proxies LAN_IP:port → container:port.
    # CRITICAL: Each worker MUST use unique DataNode ports (WORKER_DN_PORT in .env)
    # so NameNode can distinguish them. All containers share gateway 172.18.0.1,
    # so without unique ports they appear as the same DataNode to NameNode.
    ports:
      # NodeManager
      - "8042:8042"
      - "8040:8040"
      - "8041:8041"
      # DataNode ports - unique per worker via WORKER_DN_PORT env var
      # 112: 9872/9873/9874  |  113: 9882/9883/9884  |  114: 9892/9893/9894
      - "${WORKER_DN_PORT:-9872}:${WORKER_DN_PORT:-9872}"
      - "${WORKER_DN_IPC_PORT:-9873}:${WORKER_DN_IPC_PORT:-9873}"
      - "${WORKER_DN_HTTP_PORT:-9874}:${WORKER_DN_HTTP_PORT:-9874}"
      # Spark Driver & Block Managers
      - "7078:7078"
      - "7079:7079"
      - "7080:7080"
    cap_add:
      - NET_ADMIN
    env_file:
      - ./.env
    environment:
      - NODE_TYPE=worker
      - HDFS_DATANODE_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      # DataNode MUST use a Docker named volume (stored in WSL2's ext4).
      # Windows bind-mounts (9p fs) make Java's File.getTotalSpace() return 0.
      - hadoop_datanode:/hadoop_data/datanode
      - ../../config:/workspace/config
      - ../../../code:/workspace/code
      - ../../../data:/workspace/data
    mem_limit: 10g

volumes:
  hadoop_datanode: