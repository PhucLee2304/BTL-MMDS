name: mmds

services:
  worker:
    build:
      context: ../..
      dockerfile: docker/worker_docker/Dockerfile
    image: hadoop-spark-worker:real
    container_name: worker
    # Docker Desktop on Windows does NOT support network_mode:host.
    # Container runs inside WSL2 VM (192.168.65.x), NOT the Windows host.
    # Port-mapping mode is required: Docker Desktop proxies LAN_IP:port → container:port.
    ports:
      - "9866:9866"    # DataNode data transfer
      - "9867:9867"    # DataNode IPC
      - "9864:9864"    # DataNode HTTP
      - "8042:8042"    # NodeManager HTTP
      - "8040:8040"    # NodeManager localizer
      - "8041:8041"    # NodeManager shuffle
    env_file:
      - ./.env
    environment:
      - NODE_TYPE=worker
      - HDFS_DATANODE_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      # DataNode MUST use a Docker named volume (stored in WSL2's ext4).
      # Windows bind-mounts (9p fs) make Java's File.getTotalSpace() return 0.
      - hadoop_datanode:/hadoop_data/datanode
      - ../../config:/workspace/config
      - ../../../code:/workspace/code
      - ../../../data:/workspace/data
    mem_limit: 10g

volumes:
  hadoop_datanode: