name: mmds

services:
  worker:
    build:
      context: ../..
      dockerfile: docker/worker_docker/Dockerfile
    image: hadoop-spark-worker:real
    container_name: worker
    network_mode: host
    env_file:
      - ./.env
    environment:
      - NODE_TYPE=worker
      - HDFS_DATANODE_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      - ./volumes/datanode:/hadoop_data/datanode
      - ../../config:/workspace/config
      - ../../../code:/workspace/code
      - ../../../data:/workspace/data
    # deploy:
    #   resources:
    #     limits:
    #       memory: 10G
    mem_limit: 10g

# Named volumes removed: bind mounts used instead to fix 0-capacity on Windows/WSL2 Docker Desktop