name: mmds

services:
  master:
    build:
      context: ../..
      dockerfile: docker/master_docker/Dockerfile
    image: hadoop-spark-master:real
    container_name: master
    # Docker Desktop on Windows does NOT support network_mode:host.
    # Container runs inside WSL2 VM (IP 192.168.65.x), NOT the Windows host.
    # Port-mapping mode is required: Docker Desktop proxies LAN_IP:port → container:port.
    ports:
      - "9000:9000"    # NameNode RPC
      - "9870:9870"    # NameNode HTTP UI
      - "9868:9868"    # SecondaryNameNode HTTP
      - "8088:8088"    # YARN ResourceManager UI
      - "8030:8030"    # YARN Scheduler
      - "8031:8031"    # YARN ResourceTracker
      - "8032:8032"    # YARN ResourceManager
      - "8033:8033"    # YARN Admin
      - "18080:18080"  # Spark History Server
      - "9866:9866"    # DataNode data transfer
      - "9867:9867"    # DataNode IPC
      - "9864:9864"    # DataNode HTTP
      - "8040:8040"    # NodeManager Localizer
      - "8041:8041"    # NodeManager IPC
      - "8042:8042"    # NodeManager HTTP
      - "8080:8080"
      - "4040:4040"
      - "8888:8888"
      - "7078:7078"    # Spark Driver
      - "7079:7079"    # Spark BlockManager
    env_file:
      - ./.env
    environment:
      - NODE_TYPE=master
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
      - HDFS_SECONDARYNAMENODE_USER=root
      - YARN_RESOURCEMANAGER_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      - hadoop_namenode:/hadoop_data/namenode
      - hadoop_datanode_master:/hadoop_data/datanode
      - ../../config:/workspace/config
      - ../../../code:/workspace/code
      - ../../../data:/workspace/data
    mem_limit: 12g

volumes:
  hadoop_namenode:
  hadoop_datanode_master: