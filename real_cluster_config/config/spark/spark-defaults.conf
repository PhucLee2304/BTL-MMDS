spark.master                          yarn
spark.submit.deployMode               client

spark.bindAddress                     0.0.0.0
# --- Driver (chạy trên master container) ---
# 3g driver + 512m overhead = ~3.5g, để lại RAM cho NameNode/ResourceManager
spark.driver.memory                   3g
spark.driver.cores                    2
spark.driver.host                     192.168.1.111
spark.driver.bindAddress              0.0.0.0
spark.driver.port                     7078
spark.driver.blockManager.port        7079
spark.blockManager.port               7080

# --- Executor (mỗi máy 8GB / 8 vcores cho NodeManager) ---
# 4g executor + 1024m memoryOverhead = 5g per executor
# max-allocation-mb raised to 8192, fits 1 executor per node comfortably
spark.executor.memory                 4g
spark.executor.cores                  3
spark.executor.memoryOverhead         1024

# --- Static Allocation (Disable Dynamic to avoid spark_shuffle missing error) ---
spark.dynamicAllocation.enabled       false
spark.shuffle.service.enabled         false
spark.executor.instances              2

# 2 executors × 3 cores = 6 parallel tasks
spark.default.parallelism             12
spark.sql.shuffle.partitions          12

# --- Event log & History ---
spark.eventLog.enabled                true
spark.eventLog.dir                    hdfs://192.168.1.111:9000/spark-logs
spark.history.fs.logDirectory         hdfs://192.168.1.111:9000/spark-logs

# --- Data source configs ---
spark.sql.parquet.mergeSchema         false
spark.sql.parquet.enableVectorizedReader false

spark.ui.port                         4040
spark.jars.packages                   graphframes:graphframes:0.8.3-spark3.5-s_2.12

