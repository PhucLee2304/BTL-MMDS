name: mmds

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    image: master
    container_name: master
    hostname: master
    environment:
      - NODE_TYPE=master
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
      - HDFS_SECONDARYNAMENODE_USER=root
      - YARN_RESOURCEMANAGER_USER=root
      - YARN_NODEMANAGER_USER=root
    ports:
      - "9870:9870"
      - "9000:9000"
      - "8088:8088"
      - "8080:8080"
      - "18080:18080"
      - "4040:4040"
      - "8888:8888"
    volumes:
      - hadoop_namenode:/hadoop_data/namenode
      - ./config:/workspace/config
      - ./code:/workspace/code
      - ./data:/workspace/data
    networks:
      - hadoop_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    mem_limit: 6g

  worker1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: worker:latest
    container_name: worker1
    hostname: worker1
    depends_on:
      - master
    environment:
      - NODE_TYPE=worker
      - HDFS_DATANODE_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      - hadoop_datanode1:/hadoop_data/datanode
    networks:
      - hadoop_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 3G
    mem_limit: 2g

  worker2:
    image: worker:latest
    container_name: worker2
    hostname: worker2
    depends_on:
      - master
    environment:
      - NODE_TYPE=worker
      - HDFS_DATANODE_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      - hadoop_datanode2:/hadoop_data/datanode
    networks:
      - hadoop_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 3G
    mem_limit: 2g

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:

networks:
  hadoop_network:
    driver: bridge
